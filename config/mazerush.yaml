env:
  name: "Mazerush"
  config:
    num_players: 2
    width: 9
    height: 9
    seed: 42
    fps: 8
    move_cooldown: 1
    laser_duration: 15
    max_laser_items: 3
    laser_spawn_prob: 0.02
    laser_min_distance: 2
    laser_spawn_retries: 10
    max_episode_ticks: 500
    fov_size: 13
    step_penalty: -0.01

players:
  # - type: "HumanAgent"
  - type: "DeepQAgent"
  - type: "RandomAgent"
  # - type: "NothingAgent"

agent:  # DeepQAgent config (used when a player type is DeepQAgent)
  learning_rate: 5.0e-5
  discount_factor: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay: 0.998
  replay_buffer_episodes: 5000
  train_batch_size: 128
  train_epochs: 1000
  hidden_size: 256
  tau: 0.005

training:
  num_episodes: 10000000
  save_interval: 1000
  train_frequency: 10
