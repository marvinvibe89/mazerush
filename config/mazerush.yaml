env:
  name: "Mazerush"
  config:
    width: 30
    height: 20
    seed: 42
    fps: 30
    move_cooldown: 5
    laser_duration: 15
    max_laser_items: 3
    laser_spawn_prob: 0.02
    laser_min_distance: 5
    laser_spawn_retries: 10
    max_episode_ticks: 3000

players:
  # - type: "HumanAgent"
  - type: "DeepQAgent"
  - type: "RandomAgent"

agent:  # DeepQAgent config (used when a player type is DeepQAgent)
  learning_rate: 1.0e-4
  discount_factor: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay: 0.99
  replay_buffer_episodes: 1000
  train_batch_size: 128
  train_epochs: 1000
  hidden_size: 64

training:
  num_episodes: 20000
  save_interval: 1000
  train_frequency: 50
