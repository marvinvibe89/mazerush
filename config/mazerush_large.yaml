env:
  name: "Mazerush"
  config:
    num_players: 2
    width: 30
    height: 20
    seed: 42
    fps: 30
    move_cooldown: 1
    laser_duration: 15
    max_laser_items: 3
    laser_spawn_prob: 0.02
    laser_min_distance: 5
    laser_spawn_retries: 10
    max_episode_ticks: 3000
    fov_size: 13
    step_penalty: 0.0

players:
  # - type: "HumanAgent"
  - type: "DeepQAgent"
  - type: "DeepQAgent"
  - type: "DeepQAgent"
  - type: "DeepQAgent"
  - type: "NothingAgent"
  - type: "RandomAgent"

agent:  # DeepQAgent config (used when a player type is DeepQAgent)
  learning_rate: 5.0e-5
  discount_factor: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.0
  epsilon_decay: 0.9999
  replay_buffer_episodes: 500
  train_batch_size: 256
  train_epochs: 200
  hidden_size: 256
  tau: 0.00005

training:
  num_episodes: 10000000
  save_interval: 1000
  train_frequency: 10
